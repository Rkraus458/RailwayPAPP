<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CookBook{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>" />
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="{{ url_for('index') }}" class="nav__logo">
        <span class="nav__logo-icon">📖</span>
        <span>CookBook</span>
      </a>
      <a href="{{ url_for('new_recipe') }}" class="btn btn--primary">
        + Add Recipe
      </a>
    </div>
  </nav>

  <!-- Flash Messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="container">
        <div class="flash-group">
          {% for category, message in messages %}
            <div class="flash flash--{{ category }}">
              <span>{{ message }}</span>
              <button class="flash__close" onclick="this.parentElement.remove()" aria-label="Dismiss">✕</button>
            </div>
          {% endfor %}
        </div>
      </div>
    {% endif %}
  {% endwith %}

  <!-- Page Content -->
  <main>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>🍽️ CookBook — Your Personal Recipe Collection</p>
  </footer>

</body>
</html>
